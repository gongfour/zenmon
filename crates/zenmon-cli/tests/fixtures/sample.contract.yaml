# Trimmed, self-contained contract fixture for zenmon CLI integration tests.
# A self-contained sample contract used only by tests (no real contract is vendored).
version: "0.1"
project: sample

encoding:
  default: application/json
  default_enveloped: true

types:
  Pose2D:
    x: f64
    y: f64
    theta: f64

services:
  - pose_publisher
  - orchestrator

topics:
  - key: topic/navigation/robot_pose
    pattern: pub-sub
    producers: [pose_publisher]
    consumers: [orchestrator]
    description: Robot 2D pose
    payload: { $ref: Pose2D }

  - key: topic/sensor/pcd/{sensor_id}
    pattern: pub-sub
    encoding: application/msgpack
    enveloped: false
    producers: [pose_publisher]
    consumers: [orchestrator]
    description: Per-sensor point cloud

  - key: call/mission/pause
    pattern: call
    consumers: [orchestrator]
    description: Pause mission
    request: {}
    response: {}

  - key: topic/behavior/tick
    pattern: pub-sub
    status: declared-not-implemented
    producers: [orchestrator]
    description: BT tick snapshot (not yet implemented)
